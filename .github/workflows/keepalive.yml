name: keep-alive

# Pings the Render services so the free tier doesn't spin down (cold start),
# which would drop the first Telegram message a manager sends.
on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://agenthub-guru-claude-api.onrender.com/api/healthz)
          echo "API /api/healthz -> $code"
      - name: Ping Frontend
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://agenthub-guru-claude.onrender.com/)
          echo "Frontend / -> $code"
