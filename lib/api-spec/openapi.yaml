        source:
          type: string
        agentId:
          type: integer
          nullable: true
        agentName:
          type: string
          nullable: true
        clientId:
          type: integer
          nullable: true
        conversationId:
          type: integer
          nullable: true
        eventType:
          type: string
        status:
          type: string
        inputSummary:
          type: string
          nullable: true
        outputSummary:
          type: string
          nullable: true
        provider:
          type: string
          nullable: true
        model:
          type: string
          nullable: true
        inputTokens:
          type: integer
          nullable: true
        outputTokens:
          type: integer
          nullable: true
        estimatedCostUsd:
          type: number
          nullable: true
        durationMs:
          type: integer
          nullable: true
        errorMessage:
          type: string
          nullable: true
        metadata:
          nullable: true

    AgentLogSummary:
      type: object
      required: [id, createdAt, windowStart, windowEnd, totalEvents, successCount, errorCount, warningCount, summaryText]
      properties:
        id:
          type: integer
        createdAt:
          type: string
        windowStart:
          type: string
        windowEnd:
          type: string
        totalEvents:
          type: integer
        successCount:
          type: integer
        errorCount:
          type: integer
        warningCount:
          type: integer
        summaryText:
          type: string
        failurePoints:
          type: array
          items: {}
        activeAgents:
          type: array
          items: {}
        recommendations:
          type: array
          items:
            type: string
        rawStats:
          nullable: true

    ReportDailyPoint:
      type: object
      required: [date, count]
      properties:
        date:
          type: string
          description: Calendar date (YYYY-MM-DD, UTC)
        count:
          type: integer
          description: Number of tasks handled on this day

    ClientReportAgent:
      type: object
      required: [assignmentId, agentId, agentName, category, status, tasksHandled, successCount, failureCount, dailyVolume]
      properties:
        assignmentId:
          type: integer
        agentId:
          type: integer
        agentName:
          type: string
        category:
          type: string
        iconEmoji:
          type: string
          nullable: true
        status:
          type: string
          description: Assignment status (active/inactive)
        tasksHandled:
          type: integer
          description: Total tasks handled by this agent in the window
        successCount:
          type: integer
          description: Number of successful task outcomes (agent_logs status=success) in the window
        failureCount:
          type: integer
          description: Number of failed task outcomes (agent_logs status=error) in the window
        lastActive:
          type: string
          nullable: true
          description: ISO timestamp of the most recent activity, or null if none
        dailyVolume:
          type: array
          description: Per-day task volume for this agent (oldest-first)
          items:
            $ref: "#/components/schemas/ReportDailyPoint"

    ClientReport:
      type: object
      required: [clientId, clientName, windowDays, generatedAt, totalTasks, totalSuccess, totalFailure, agents, dailyTotals]
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        windowDays:
          type: integer
          description: Number of days the report window covers
        generatedAt:
          type: string
          description: ISO timestamp when the report was generated
        totalTasks:
          type: integer
          description: Total tasks handled across all agents in the window
        totalSuccess:
          type: integer
          description: Total successful task outcomes across the client in the window
        totalFailure:
          type: integer
          description: Total failed task outcomes across the client in the window
        agents:
          type: array
          description: Per-agent usage rows, sorted by tasks handled (descending)
          items:
            $ref: "#/components/schemas/ClientReportAgent"
        dailyTotals:
          type: array
          description: Client-level per-day task volume (oldest-first)
          items:
            $ref: "#/components/schemas/ReportDailyPoint"

    DedupDailyPoint:
      type: object
      required: [date, count]
      properties:
        date:
          type: string
          description: >-
            Bucket key (UTC). A calendar date (YYYY-MM-DD) when breakdownUnit is
            "day", or a full ISO hour (YYYY-MM-DDTHH:00:00Z) when breakdownUnit
            is "hour" (sub-day windows).
        count:
          type: integer
          description: Number of deduplicated events in this bucket

    DedupWarnThresholdUpdate:
      type: object
      required: [threshold]
      properties:
        threshold:
          type: integer
          minimum: 1
          description: New threshold value
        changedBy:
          type: string
          maxLength: 120
          description: Name or identifier of the person making the change

    DedupWarnThresholdSetting:
      type: object
      required: [threshold]
      properties:
        threshold:
          type: integer
          description: Number of deduplicated events in 7 days that triggers the high-rate warning

    TriggerStatsSummary:
      type: object
      required: [highDedupCount, windowDays, windowHours, windowUnit, affectedClients]
      properties:
        highDedupCount:
          type: integer
          description: Total number of integrations (assignments) flagged with a high duplicate rate
        windowDays:
          type: number
          description: Number of days the window covers (windowHours / 24)
        windowHours:
          type: integer
          description: Canonical window length in hours
        windowUnit:
          type: string
          enum: [hours, days]
          description: Unit chosen by ops for display
        affectedClients:
          type: array
          items:
            type: object
            required: [clientId, clientName, count]
            properties:
              clientId:
                type: integer
              clientName:
                type: string
              count:
                type: integer
                description: Number of integrations with a high duplicate rate for this client

    DedupWarnThresholdHistory:
      type: object
      required: [history]
      properties:
        history:
          type: array
          description: Threshold change entries, most recent first
          items:
            type: object
            required: [id, newValue, changedBy, changedAt]
            properties:
              id:
                type: integer
              oldValue:
                type: integer
                nullable: true
                description: Previous threshold value, or null if this was the first change
              newValue:
                type: integer
                description: New threshold value after the change
              changedBy:
                type: string
                description: Who made the change
              changedAt:
                type: string
                format: date-time
                description: When the change was made

    WebhookTelegramNotificationsSetting:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Whether the "Webhook Triggered" Telegram notification is sent on a real fire

    WebhookTelegramNotificationsUpdate:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Set to false to mute the "Webhook Triggered" Telegram notification
        changedBy:
          type: string
          maxLength: 120
          description: Name or identifier of the person making the change

    WebhookTelegramNotificationsHistory:
      type: object
      required: [history]
      properties:
        history:
          type: array
          description: Toggle change entries, most recent first
          items:
            type: object
            required: [id, enabled, changedBy, changedAt]
            properties:
              id:
                type: integer
              previousEnabled:
                type: boolean
                nullable: true
                description: Previous toggle state, or null if this was the first change
              enabled:
                type: boolean
                description: New toggle state after the change
              changedBy:
                type: string
                description: Who made the change
              changedAt:
                type: string
                format: date-time
                description: When the change was made

    DedupWindowUpdate:
      type: object
      required: [value, unit]
      properties:
        value:
          type: integer
          minimum: 1
          maximum: 8760
          description: >-
            New rolling-window length, interpreted in the given unit. Must not
            exceed 365 days / 8760 hours.
        unit:
          type: string
          enum: [hours, days]
          description: Unit the value is expressed in
        changedBy:
          type: string
          maxLength: 120
          description: Name or identifier of the person making the change

    DedupWindowSetting:
      type: object
      required: [windowHours, windowDays, unit]
      properties:
        windowHours:
          type: integer
          description: Canonical rolling-window length in hours
        windowDays:
          type: number
          description: Rolling-window length in days (windowHours / 24)
        unit:
          type: string
          enum: [hours, days]
          description: Unit chosen by ops for display

    DedupWindowHistory:
      type: object
      required: [history]
      properties:
        history:
          type: array
          description: Window-length change entries (values in hours), most recent first
          items:
            type: object
            required: [id, newValueHours, changedBy, changedAt]
            properties:
              id:
                type: integer
              oldValueHours:
                type: integer
                nullable: true
                description: Previous window length in hours, or null if this was the first change
              newValueHours:
                type: integer
                description: New window length in hours after the change
              changedBy:
                type: string
                description: Who made the change
              changedAt:
                type: string
                format: date-time
                description: When the change was made

    ClientTriggerStats:
      type: object
      required: [totalDeduplicated, windowDays, windowHours, windowUnit, breakdownUnit, dailyBreakdown, perAssignment]
      properties:
        totalDeduplicated:
          type: integer
          description: Total deduplicated events across all assignments in the window
        windowDays:
          type: number
          description: Number of days the window covers (windowHours / 24)
        windowHours:
          type: integer
          description: Canonical window length in hours
        windowUnit:
          type: string
          enum: [hours, days]
          description: Unit chosen by ops for display
        breakdownUnit:
          type: string
          enum: [hour, day]
          description: >-
            Bucket granularity of every dailyBreakdown series in this response.
            "hour" for sub-day windows (< 24h), "day" otherwise.
        dailyBreakdown:
          type: array
          description: Per-bucket dedup counts (client-level aggregate, oldest-first)
          items:
            $ref: "#/components/schemas/DedupDailyPoint"
        warnThreshold:
          type: integer
          description: The current dedup warning threshold (from DB setting or env var fallback)
        perAssignment:
          type: array
          items:
            type: object
            required: [assignmentId, deduplicated, highDedupRate, dailyBreakdown]
            properties:
              assignmentId:
                type: integer
              deduplicated:
                type: integer
              highDedupRate:
                type: boolean
                description: True when deduplicated count meets or exceeds the warn threshold
              dailyBreakdown:
                type: array
                description: Per-day dedup counts for this assignment
                items:
                  $ref: "#/components/schemas/DedupDailyPoint"

    TriggerEvent:
      type: object
      required: [id, triggerId, assignmentId, agentStatus, firedAt]
      properties:
        id:
          type: integer
        triggerId:
          type: integer
        assignmentId:
          type: integer
        payload:
          nullable: true
        agentStatus:
          type: string
          description: Agent execution state at time of event (triggered/running/idle/deduplicated)
        agentOutput:
          type: string
          nullable: true
          description: The agent's response text, populated when agentStatus is idle
        firedAt:
          type: string

    ClientTriggerEvent:
      type: object
      required: [id, triggerId, assignmentId, agentStatus, firedAt, agentName]
      properties:
        id:
          type: integer
        triggerId:
          type: integer
        assignmentId:
          type: integer
        payload:
          nullable: true
        agentStatus:
          type: string
          description: Agent execution state at time of event (triggered/running/idle)
        firedAt:
          type: string
        agentName:
          type: string
          description: Name of the agent that fired this event

    AssignmentTrigger:
      type: object
      required: [id, assignmentId, webhookUrl, status, createdAt, recentEvents]
      properties:
        id:
          type: integer
        assignmentId:
          type: integer
        webhookUrl:
          type: string
        status:
          type: string
        lastFiredAt:
          type: ["string", "null"]
        lastPayload:
          nullable: true
        createdAt:
          type: string
        recentEvents:
          type: array
          description: Up to 10 most recent trigger events
          items:
            $ref: "#/components/schemas/TriggerEvent"

    WebhookPayload:
      type: object
      description: Arbitrary JSON payload from a client's live app
      additionalProperties: true

    WebhookTriggerResult:
