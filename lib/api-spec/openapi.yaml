openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: AgentHub - AI Agent Management Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: webhooks
    description: Incoming webhook triggers from external client apps
  - name: health
    description: Health operations
  - name: agents
    description: AI Agent operations
  - name: clients
    description: Client (company) operations
  - name: assignments
    description: Agent assignment operations
  - name: orchestrator
    description: Orchestrator configuration
  - name: stats
    description: Dashboard statistics
  - name: workflows
    description: Visual workflow canvas operations
  - name: telegram
    description: Telegram bot integration
  - name: spec-agent
    description: Specification Agent — conversational AI for generating automation specs
  - name: lang-agent
    description: Language Expert Agent — domain-aware multilingual document translation and adaptation
  - name: logs
    description: Agent operation logs and AI-generated analysis summaries
  - name: study
    description: Study Listener — real-time lecture transcription and AI-generated study documents
  - name: settings
    description: Global platform settings configurable by ops

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags: [agents]
      summary: List all AI agents
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags: [agents]
      summary: Create a new AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/categories:
    get:
      operationId: listAgentCategories
      tags: [agents]
      summary: List agent categories with counts
      responses:
        "200":
          description: Categories with agent counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentCategory"

  /agents/{id}:
    get:
      operationId: getAgent
      tags: [agents]
      summary: Get agent by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    patch:
      operationId: updateAgent
      tags: [agents]
      summary: Update an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
    delete:
      operationId: deleteAgent
      tags: [agents]
      summary: Delete an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a new client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get client by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "404":
          description: Not found
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /clients/{id}/assignments:
    get:
      operationId: listClientAssignments
      tags: [assignments]
      summary: List agent assignments for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
    post:
      operationId: createAssignment
      tags: [assignments]
      summary: Assign an agent to a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentInput"
      responses:
        "201":
          description: Created assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"

  /clients/{id}/assignments/{agentId}:
    patch:
      operationId: updateAssignment
      tags: [assignments]
      summary: Update an agent assignment customization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentUpdate"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "404":
          description: Not found
    delete:
      operationId: removeAssignment
      tags: [assignments]
      summary: Remove an agent from a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /assignments/{id}/automation:
    patch:
      operationId: toggleAutomation
      tags: [assignments]
      summary: Enable or disable automation for a single assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AutomationTogglePayload"
      responses:
        "200":
          description: Updated assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "404":
          description: Not found

  /clients/{id}/automations/disable-all:
    post:
      operationId: disableAllAutomations
      tags: [assignments]
      summary: Master kill switch — disable all automations for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MasterKillPayload"
      responses:
        "200":
          description: Count of disabled automations
          content:
            application/json:
              schema:
                type: object
                required: [disabled]
                properties:
                  disabled:
                    type: integer

  /clients/{id}/automation-logs:
    get:
      operationId: listAutomationLogs
      tags: [assignments]
      summary: Get automation shutdown logs for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of automation logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationLog"

  /clients/{id}/orchestrator:
    get:
      operationId: getOrchestrator
      tags: [orchestrator]
      summary: Get orchestrator config for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Orchestrator config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestratorConfig"
        "404":
          description: Not found
    put:
      operationId: upsertOrchestrator
      tags: [orchestrator]
      summary: Create or update orchestrator config for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchestratorInput"
      responses:
        "200":
          description: Updated orchestrator config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestratorConfig"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /activity/recent:
    get:
      operationId: listRecentActivity
      tags: [stats]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEvent"

  /workflows:
    get:
      operationId: listWorkflows
      tags: [workflows]
      summary: List all workflows
      responses:
        "200":
          description: List of workflows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workflow"
    post:
      operationId: createWorkflow
      tags: [workflows]
      summary: Create a new workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowInput"
      responses:
        "201":
          description: Created workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"

  /workflows/{id}:
    get:
      operationId: getWorkflow
      tags: [workflows]
      summary: Get workflow by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workflow details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found
    patch:
      operationId: updateWorkflow
      tags: [workflows]
      summary: Update a workflow (save canvas state)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowUpdate"
      responses:
        "200":
          description: Updated workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workflow"
        "404":
          description: Not found
    delete:
      operationId: deleteWorkflow
      tags: [workflows]
      summary: Delete a workflow
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /telegram/webhook:
    post:
      operationId: telegramWebhook
      tags: [telegram]
      summary: Receive Telegram bot updates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramWebhookResult"

  /telegram/setup:
    post:
      operationId: setupTelegramWebhook
      tags: [telegram]
      summary: Register webhook URL with Telegram
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramSetupInput"
      responses:
        "200":
          description: Setup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramSetupResult"

  /conversations/client/{clientId}/agent/{agentId}:
    get:
      operationId: getOrCreateConversation
      tags: [conversations]
      summary: Get or create conversation for a client+agent pair
      parameters:
        - name: clientId
          in: path
          required: true
          schema:
            type: integer
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get a conversation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
    delete:
      operationId: clearConversation
      tags: [conversations]
      summary: Clear conversation memory (reset to empty)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [conversations]
      summary: Send a user message and get AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageInput"
      responses:
        "200":
          description: Response pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResult"

  /telegram/status:
    get:
      operationId: getTelegramStatus
      tags: [telegram]
      summary: Get Telegram bot status and pending client count
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramStatus"

  /spec-agent/chat:
    post:
      operationId: specAgentChat
      tags: [spec-agent]
      summary: Spec Agent conversational chat turn
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SpecAgentChatInput"
      responses:
        "200":
          description: Agent reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpecAgentChatResult"

  /logs:
    get:
      operationId: listAgentLogs
      tags: [logs]
      summary: List agent operation logs with optional filters
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer }
        - name: offset
          in: query
          required: false
          schema: { type: integer }
        - name: source
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string }
        - name: since
          in: query
          required: false
          schema: { type: string }
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLog"

  /logs/summary:
    get:
      operationId: getLogSummary
      tags: [logs]
      summary: Get the latest AI-generated log summary
      responses:
        "200":
          description: Latest summary or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentLogSummary"

  /logs/analyze:
    post:
      operationId: triggerLogAnalysis
      tags: [logs]
      summary: Manually trigger log analysis
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriggerLogAnalysisInput"
      responses:
        "200":
          description: Analysis triggered
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  message:
                    type: string

  /settings/dedup-warn-threshold:
    get:
      operationId: getDedupWarnThreshold
      tags: [settings]
      summary: Get the duplicate-warning threshold (number of deduped events in 7 days before ops are warned)
      responses:
        "200":
          description: Current threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWarnThresholdSetting"
    put:
      operationId: updateDedupWarnThreshold
      tags: [settings]
      summary: Update the duplicate-warning threshold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedupWarnThresholdUpdate"
      responses:
        "200":
          description: Updated threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWarnThresholdSetting"
        "400":
          description: Invalid threshold value

  /trigger-stats/summary:
    get:
      operationId: getTriggerStatsSummary
      tags: [stats]
      summary: Cross-client roll-up of integrations with a high duplicate rate (last 7 days)
      responses:
        "200":
          description: High-dedup-rate summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerStatsSummary"

  /settings/dedup-warn-threshold/history:
    get:
      operationId: getDedupWarnThresholdHistory
      tags: [settings]
      summary: Get the change history of the duplicate-warning threshold (most recent first)
      responses:
        "200":
          description: Threshold change history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWarnThresholdHistory"

  /settings/dedup-window:
    get:
      operationId: getDedupWindow
      tags: [settings]
      summary: Get the duplicate-detection rolling window length (hours + days + chosen unit)
      responses:
        "200":
          description: Current window length
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWindowSetting"
    put:
      operationId: updateDedupWindow
      tags: [settings]
      summary: Update the duplicate-detection rolling window length (value + unit of hours or days)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DedupWindowUpdate"
      responses:
        "200":
          description: Updated window length
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWindowSetting"
        "400":
          description: Invalid window value

  /settings/dedup-window/history:
    get:
      operationId: getDedupWindowHistory
      tags: [settings]
      summary: Get the change history of the duplicate-detection window length (most recent first)
      responses:
        "200":
          description: Window length change history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DedupWindowHistory"

  /settings/webhook-telegram-notifications:
    get:
      operationId: getWebhookTelegramNotifications
      tags: [settings]
      summary: Get whether the "Webhook Triggered" Telegram notification is enabled
      responses:
        "200":
          description: Current toggle state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTelegramNotificationsSetting"
    put:
      operationId: updateWebhookTelegramNotifications
      tags: [settings]
      summary: Enable or disable the "Webhook Triggered" Telegram notification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookTelegramNotificationsUpdate"
      responses:
        "200":
          description: Updated toggle state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTelegramNotificationsSetting"
        "400":
          description: Invalid request body
  /clients/{id}/report:
    get:
      operationId: getClientReport
      tags: [clients]
      summary: Per-client usage & performance report (agent task volume over last 30 days)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Usage report aggregating agent activity for this client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientReport"
        "400":
          description: Invalid client id
        "404":
          description: Client not found

  /settings/webhook-telegram-notifications/history:
    get:
      operationId: getWebhookTelegramNotificationsHistory
      tags: [settings]
      summary: Get the change history of the "Webhook Triggered" Telegram notification toggle (most recent first)
      responses:
        "200":
          description: Toggle change history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTelegramNotificationsHistory"

  /clients/{id}/trigger-stats:
    get:
      operationId: getClientTriggerStats
      tags: [clients]
      summary: Get duplicate-suppression stats for a client across all assignments (last 7 days)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dedup stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientTriggerStats"
        "400":
          description: Invalid client id

  /assignments/{id}/trigger:
    get:
      operationId: getAssignmentTrigger
      tags: [assignments]
      summary: Get trigger config for an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trigger config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentTrigger"
        "404":
          description: Not found
    post:
      operationId: createAssignmentTrigger
      tags: [assignments]
      summary: Create or regenerate a webhook trigger for an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trigger config with fresh secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentTrigger"

  /assignments/{id}/trigger/events:
    get:
      operationId: listAssignmentTriggerEvents
      tags: [assignments]
      summary: List trigger fire history for an assignment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trigger events newest-first (up to 20)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriggerEvent"
        "404":
          description: No trigger configured for this assignment

  /clients/{id}/trigger/events:
    get:
      operationId: listClientTriggerEvents
      tags: [assignments]
      summary: List all trigger events for a client across all assigned agents (newest first, max 20)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of trigger events newest-first (up to 20)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientTriggerEvent"

  /webhooks/trigger/{secret}:
    post:
      operationId: fireWebhookTrigger
      tags: [webhooks]
      summary: Receive an inbound webhook event from a client's live app
      parameters:
        - name: secret
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookPayload"
      responses:
        "200":
          description: Event received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookTriggerResult"
        "404":
          description: Unknown secret
        "409":
          description: Agent already running for this trigger

  /study/summarize:
    post:
      operationId: studySummarize
      tags: [study]
      summary: Generate lecture summary and homework list from full transcript
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudySummarizeInput"
      responses:
        "200":
          description: Generated study documents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySummarizeResult"

  /study/sessions:
    get:
      operationId: listStudySessions
      tags: [study]
      summary: List all past study sessions
      responses:
        "200":
          description: List of study sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudySession"
    post:
      operationId: createStudySession
      tags: [study]
      summary: Log a completed study session and post to AgentHub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StudySessionInput"
      responses:
        "201":
          description: Created session record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySession"

  /study/sessions/{id}:
    get:
      operationId: getStudySession
      tags: [study]
      summary: Get a specific study session by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Study session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudySession"
        "404":
          description: Not found

  /lang-agent/translate:
    post:
      operationId: langAgentTranslate
      tags: [lang-agent]
      summary: Translate and domain-adapt a document with expert language
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LangAgentTranslateInput"
      responses:
        "200":
          description: Translated and adapted document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LangAgentTranslateResult"

