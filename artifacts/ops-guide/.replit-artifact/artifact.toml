kind = "slides"
previewPath = "/ops-guide/"
title = "AgentHub — מדריך תפעול ושיתוף פעולה"
version = "1.0.0"
id = "artifacts/ops-guide"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ops-guide/" ]
localPort = 22454

[services.development]
run = "pnpm --filter @workspace/ops-guide run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ops-guide", "run", "build" ]
publicDir = "artifacts/ops-guide/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22454"
BASE_PATH = "/ops-guide/"
